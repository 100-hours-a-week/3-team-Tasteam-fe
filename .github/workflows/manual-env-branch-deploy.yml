name: Frontend Manual Deploy (Env + Branch)

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "배포 환경 선택"
        required: true
        default: "staging"
        type: choice
        options:
          - production
          - staging
      source_branch:
        description: "배포할 브랜치 이름 (예: main, feature/xxx)"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontend-manual-${{ inputs.target_environment }}-${{ inputs.source_branch }}
  cancel-in-progress: false

jobs:
  deploy-production-cdn:
    if: ${{ inputs.target_environment == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Capture deployment metadata
        id: metadata
        run: |
          echo "deploy_env=production" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${{ inputs.source_branch }}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: npm run build

      - name: Write version metadata
        run: |
          cat > dist/version.txt <<EOF
          branch=${{ steps.metadata.outputs.deploy_ref }}
          environment=production
          run_number=${{ github.run_number }}
          sha=${{ steps.metadata.outputs.deploy_sha }}
          deployed_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Validate required secrets
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          FRONTEND_STATIC_BUCKET_NAME: ${{ secrets.FRONTEND_STATIC_BUCKET_NAME }}
          FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          [ -n "${AWS_DEPLOY_ROLE_ARN}" ] || { echo "::error::AWS_DEPLOY_ROLE_ARN secret is required"; exit 1; }
          [ -n "${FRONTEND_STATIC_BUCKET_NAME}" ] || { echo "::error::FRONTEND_STATIC_BUCKET_NAME secret is required"; exit 1; }
          [ -n "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" ] || { echo "::error::FRONTEND_CLOUDFRONT_DISTRIBUTION_ID secret is required"; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-northeast-2' }}

      - name: Upload assets (immutable)
        env:
          FRONTEND_STATIC_BUCKET_NAME: ${{ secrets.FRONTEND_STATIC_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 sync dist/assets "s3://${FRONTEND_STATIC_BUCKET_NAME}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload non-index files (no-cache)
        env:
          FRONTEND_STATIC_BUCKET_NAME: ${{ secrets.FRONTEND_STATIC_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 sync dist "s3://${FRONTEND_STATIC_BUCKET_NAME}" \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Upload index.html (no-cache)
        env:
          FRONTEND_STATIC_BUCKET_NAME: ${{ secrets.FRONTEND_STATIC_BUCKET_NAME }}
        run: |
          set -euo pipefail
          aws s3 cp dist/index.html "s3://${FRONTEND_STATIC_BUCKET_NAME}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: CloudFront invalidation
        env:
          FRONTEND_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.FRONTEND_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "${FRONTEND_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/" "/index.html"

  deploy-staging-scp:
    if: ${{ inputs.target_environment == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}

      - name: Capture deployment metadata
        id: metadata
        run: |
          BRANCH_SLUG="$(printf '%s' "${{ inputs.source_branch }}" | tr '/' '-')"
          echo "deploy_ref=${{ inputs.source_branch }}" >> "$GITHUB_OUTPUT"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "deploy_short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: npm run build

      - name: Write version metadata
        run: |
          cat > dist/version.txt <<EOF
          branch=${{ steps.metadata.outputs.deploy_ref }}
          environment=staging
          run_number=${{ github.run_number }}
          sha=${{ steps.metadata.outputs.deploy_sha }}
          deployed_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      - name: Upload Build Files to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          source: "dist/*"
          target: "/home/${{ secrets.USERNAME }}/frontend/staging/stg/${{ steps.metadata.outputs.branch_slug }}/${{ github.run_number }}"
          strip_components: 1

      - name: Promote Staging to Release
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          script: |
            set -euo pipefail

            STAGING_DIR="/home/${{ secrets.USERNAME }}/frontend/staging/stg/${{ steps.metadata.outputs.branch_slug }}/${{ github.run_number }}"
            DEPLOY_BASE="/opt/caddy/www/html"
            RELEASES_DIR="${DEPLOY_BASE}/releases"
            CURRENT_LINK="${DEPLOY_BASE}/current"
            BRANCH_SLUG="${{ steps.metadata.outputs.branch_slug }}"
            SHORT_SHA="${{ steps.metadata.outputs.deploy_short_sha }}"
            RELEASE_ID="stg-${BRANCH_SLUG}-${{ github.run_number }}-${SHORT_SHA}"
            RELEASE_DIR="${RELEASES_DIR}/${RELEASE_ID}"
            RELEASE_LINK_TARGET="releases/${RELEASE_ID}"
            TMP_LINK="${DEPLOY_BASE}/.current_tmp"

            if [ ! -d "$STAGING_DIR" ]; then
              echo "❌ Staging directory not found: $STAGING_DIR"
              exit 1
            fi

            sudo mkdir -p "$RELEASES_DIR"
            sudo mkdir -p "$RELEASE_DIR"
            sudo cp -a "$STAGING_DIR"/. "$RELEASE_DIR"/

            sudo rm -f "$TMP_LINK"
            sudo ln -s "$RELEASE_LINK_TARGET" "$TMP_LINK"
            sudo mv -Tf "$TMP_LINK" "$CURRENT_LINK"

            rm -rf "$STAGING_DIR"

            (sudo ls -1dt "$RELEASES_DIR"/* 2>/dev/null || true) | tail -n +6 | xargs -r sudo rm -rf

      - name: Cleanup Staging Directory
        if: always()
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          script: |
            rm -rf "/home/${{ secrets.USERNAME }}/frontend/staging/stg/${{ steps.metadata.outputs.branch_slug }}/${{ github.run_number }}"
