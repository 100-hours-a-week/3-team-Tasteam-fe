name: Frontend CD

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    steps:
      - name: Validate deploy branch
        run: |
          case "${GITHUB_REF_NAME}" in
            develop) ;;
            *)
              echo "Unsupported deploy branch: ${GITHUB_REF_NAME}"
              echo "Frontend CD supports only develop."
              exit 1
              ;;
          esac

      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Node.js 설정
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. 환경변수 파일 생성
      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # 5. 빌드
      - name: Build
        run: npm run build

      - name: Write version metadata
        run: |
          cat > dist/version.txt <<EOF
          branch=${{ github.ref_name }}
          run_number=${{ github.run_number }}
          sha=${{ github.sha }}
          deployed_at_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

      # 6. 빌드 산출물 업로드 (run_number 기반 - 롤백용)
      - name: Upload Build Artifact (with run number)
        uses: actions/upload-artifact@v4
        with:
          name: fe-${{ github.ref_name }}-${{ github.run_number }}
          path: dist/
          retention-days: 7

      # 7. 빌드 요약
      - name: Build Summary
        run: |
          echo "### Build Success :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** 개발" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact Name:** \`fe-${{ github.ref_name }}-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can rollback to this version using the Rollback workflow." >> $GITHUB_STEP_SUMMARY

      # 8. 빌드 실패 알림
      - name: Notify Build Failure
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "프론트엔드 개발 서버 빌드 실패 💔"
          description: |
            **결과:** 빌드 실패
            **브랜치:** ${{ github.ref_name }}
            **Run Number:** ${{ github.run_number }}
            **작성자:** ${{ github.actor }}
            **커밋:** ${{ github.sha }}
          color: 0xff0000

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 20

    steps:
      # 1. 빌드 산출물 다운로드
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: fe-${{ github.ref_name }}-${{ github.run_number }}
          path: ./deploy-temp

      # 2. 서버로 빌드 산출물 업로드 (고유 staging 경로)
      - name: Upload Build Files to Staging
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          source: './deploy-temp/*'
          target: '/home/${{ secrets.USERNAME }}/frontend/staging/${{ github.ref_name }}/${{ github.run_number }}'
          strip_components: 1

      # 3. 새 release 생성 후 current 심볼릭 링크 전환 (atomic)
      - name: Promote Staging to Release
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          script: |
            set -euo pipefail

            STAGING_DIR="/home/${{ secrets.USERNAME }}/frontend/staging/${{ github.ref_name }}/${{ github.run_number }}"
            DEPLOY_BASE="/opt/caddy/www/html"
            RELEASES_DIR="${DEPLOY_BASE}/releases"
            CURRENT_LINK="${DEPLOY_BASE}/current"
            SHORT_SHA="$(printf '%s' '${{ github.sha }}' | cut -c1-12)"
            BRANCH_SLUG="$(printf '%s' '${{ github.ref_name }}' | tr '/' '-')"
            RELEASE_ID="${BRANCH_SLUG}-${{ github.run_number }}-${SHORT_SHA}"
            RELEASE_DIR="${RELEASES_DIR}/${RELEASE_ID}"
            # Use a relative symlink target so it resolves correctly both on host
            # (/opt/caddy/www/html) and inside the Caddy container (/var/www/html).
            RELEASE_LINK_TARGET="releases/${RELEASE_ID}"
            TMP_LINK="${DEPLOY_BASE}/.current_tmp"

            if [ ! -d "$STAGING_DIR" ]; then
              echo "❌ Staging directory not found: $STAGING_DIR"
              exit 1
            fi

            sudo mkdir -p "$RELEASES_DIR"
            sudo mkdir -p "$RELEASE_DIR"
            sudo cp -a "$STAGING_DIR"/. "$RELEASE_DIR"/

            sudo rm -f "$TMP_LINK"
            sudo ln -s "$RELEASE_LINK_TARGET" "$TMP_LINK"
            sudo mv -Tf "$TMP_LINK" "$CURRENT_LINK"

            rm -rf "$STAGING_DIR"

            # 최근 5개 릴리즈만 유지
            (sudo ls -1dt "$RELEASES_DIR"/* 2>/dev/null || true) | tail -n +6 | xargs -r sudo rm -rf

            echo "✅ Deployed release: $RELEASE_DIR"
            echo "✅ Current link -> $(readlink "$CURRENT_LINK")"
            if [ -f "$CURRENT_LINK/version.txt" ]; then
              echo "--- version.txt ---"
              cat "$CURRENT_LINK/version.txt"
            fi

      # 4. 실패/중단 포함 staging 잔여물 정리
      - name: Cleanup Staging Directory
        if: always()
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          timeout: 2m
          script: |
            rm -rf "/home/${{ secrets.USERNAME }}/frontend/staging/${{ github.ref_name }}/${{ github.run_number }}"

      # 5. 배포 결과 알림 (Discord)
      - name: Notify Deployment Result
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "프론트엔드 개발 서버 배포 ${{ job.status == 'success' && '성공 💗' || '실패 💔💀' }}"
          description: |
            **결과:** ${{ job.status }}
            **브랜치:** ${{ github.ref_name }}
            **Run Number:** ${{ github.run_number }}
            **작성자:** ${{ github.actor }}
            **커밋:** ${{ github.sha }}
            **서버 환경:** 개발 서버
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
